name: Build and Publish Docker Image

on:
  push:
    branches:
      - dev
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up QEMU for multi-platform docker build (important for home servers / Raspberry Pi)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Convert repository name to lowercase for Docker image naming requirements
      # Build tag list based on trigger type
      - name: Build image tags
        id: tags
        run: |
          IMG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "TAGS=$IMG:latest,$IMG:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAGS=$IMG:${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      # Build and push Docker image with support for amd64 and arm64
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
